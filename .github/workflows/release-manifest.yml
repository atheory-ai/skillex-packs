name: release-manifest

# Publishes the signed registry manifest. Runs after a pack release completes
# (and on demand). The manifest's SHA256s are sourced from the actual
# published release assets (build-manifest --from-releases), so the manifest
# provably matches what consumers download — independent of build determinism.
#
# Publishing model: the manifest is a version-controlled artifact on `main`
# (registry/manifest.json + .bundle), updated via a **reviewed PR**.
# This is the only write path that fits the repo's security posture —
# immutable releases rule out updating a release, and the Tag Ruleset rules
# out CI creating new tags — while keeping `main` fully protected
# (require-PR + signed commits, no bot bypass). This workflow pushes the
# signed manifest to a branch and links a PR; a human opens (if org policy
# bars Actions from creating PRs), reviews, and squash-merges — GitHub signs
# the resulting commit on `main`. Pack tarballs stay on their immutable,
# per-version GitHub Releases.
#
# First-party only: gh + git + GitHub/Sigstore official actions. No
# third-party PR actions.

on:
  workflow_run:
    workflows: [release-pack]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write        # push the bot branch
  pull-requests: write   # open the manifest PR
  id-token: write        # cosign keyless

jobs:
  propose:
    # Only after a successful pack release (or a manual run).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci

      - name: Build manifest from published release assets
        run: npm run build:manifest -- --from-releases

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign manifest (keyless, bundle)
        run: |
          # A cosign bundle is self-contained (signature + cert + tlog entry),
          # so verify-blob checks it against the embedded entry instead of an
          # online Rekor search (which is flaky for separate sig/cert files).
          cosign sign-blob --yes \
            --bundle registry/manifest.json.bundle \
            registry/manifest.json

      - name: Open / update the manifest PR
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          branch="bot/manifest-update"
          git switch -C "$branch"
          git add registry/manifest.json registry/manifest.json.bundle

          if git diff --cached --quiet; then
            echo "Manifest unchanged; nothing to propose."
            exit 0
          fi

          gen="$(node -p 'require("./registry/manifest.json").generatedAt')"
          # -s adds the DCO sign-off so the dco check passes on this PR.
          git commit -s -m "chore(registry): publish manifest ($gen)"
          git push -f origin "$branch"

          url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/main...${branch}?expand=1"
          body="Automated manifest build (\`--from-releases\`), cosign-signed. Review and **squash-merge** to publish; GitHub signs the resulting commit on \`main\`. Updates \`registry/manifest.json\` + \`.bundle\`. (generatedAt: $gen)"

          # Try to open the PR. Org policy commonly forbids Actions from
          # creating PRs; if so, fall back to printing a one-click link for a
          # maintainer to open it. Either way a human reviews + squash-merges.
          if gh pr view "$branch" --json state --jq .state 2>/dev/null | grep -q OPEN; then
            echo "Existing manifest PR updated → $url"
          elif gh pr create --base main --head "$branch" --title "Publish registry manifest" --body "$body" 2>/dev/null; then
            echo "Opened manifest PR."
          else
            echo "::notice::Actions can't auto-open PRs here (org policy). Open the publish PR: $url"
          fi

          {
            echo "## Signed manifest ready to publish"
            echo ""
            echo "Branch \`$branch\` updated (generatedAt \`$gen\`)."
            echo ""
            echo "👉 [Open the publish PR]($url) — review and squash-merge."
          } >> "$GITHUB_STEP_SUMMARY"
