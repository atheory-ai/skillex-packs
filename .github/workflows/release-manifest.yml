name: release-manifest

# Publishes the signed registry manifest. Runs after a pack release completes
# (and on demand). The manifest's SHA256s are sourced from the actual
# published release assets (build-manifest --from-releases), so the manifest
# provably matches what consumers download — independent of build determinism.
#
# Canonical output: a single long-lived `manifest` GitHub Release whose assets
# (manifest.json + .sig + .cert) are clobbered on every publish. CI never
# CREATES tags — that respects the repo's Tag Ruleset (restrict-creation +
# require-signed-tags). The `manifest` release/tag is created ONCE by an admin
# (see .github/BRANCH_PROTECTION.md); thereafter CI only uploads assets.
# "Latest" is whatever this release currently holds (manifest.generatedAt
# identifies the build); the engine verifies the cosign signature per fetch.

on:
  workflow_run:
    workflows: [release-pack]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write   # upload assets to the manifest Release
  id-token: write   # cosign keyless

jobs:
  publish:
    # Only after a successful pack release (or a manual run).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci

      - name: Build manifest from published release assets
        run: npm run build:manifest -- --from-releases

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign manifest (keyless)
        run: |
          cosign sign-blob --yes \
            --output-signature registry/manifest.json.sig \
            --output-certificate registry/manifest.json.cert \
            registry/manifest.json

      - name: Publish signed manifest (clobber the 'manifest' release assets)
        run: |
          set -euo pipefail
          # CI does not create tags (Tag Ruleset). The 'manifest' release is
          # created once by an admin; here we only refresh its assets.
          if ! gh release view manifest >/dev/null 2>&1; then
            echo "::error::The 'manifest' release does not exist yet."
            echo "::error::One-time admin step: create a signed tag 'manifest' and a release for it"
            echo "::error::(see .github/BRANCH_PROTECTION.md), then re-run this workflow."
            exit 1
          fi
          gh release upload manifest \
            registry/manifest.json \
            registry/manifest.json.sig \
            registry/manifest.json.cert \
            --clobber
          echo "Updated the 'manifest' release (generatedAt $(node -p 'require("./registry/manifest.json").generatedAt'))."
