name: release-manifest

# Publishes the signed registry manifest. Runs after a pack release completes
# (and on demand). The manifest's SHA256s are sourced from the actual
# published release assets (build-manifest --from-releases), so the manifest
# provably matches what consumers download — independent of build determinism.
#
# Publishing model: the manifest is a version-controlled artifact on `main`
# (registry/manifest.json + .sig + .cert), updated via a **reviewed PR**.
# This is the only write path that fits the repo's security posture —
# immutable releases rule out updating a release, and the Tag Ruleset rules
# out CI creating new tags — while keeping `main` fully protected
# (require-PR + signed commits, no bot bypass). A human reviews and
# squash-merges the PR; GitHub signs the resulting commit on `main`.
# Pack tarballs stay on their immutable, per-version GitHub Releases.
#
# First-party only: gh + git + GitHub/Sigstore official actions. No
# third-party PR actions.

on:
  workflow_run:
    workflows: [release-pack]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write        # push the bot branch
  pull-requests: write   # open the manifest PR
  id-token: write        # cosign keyless

jobs:
  propose:
    # Only after a successful pack release (or a manual run).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci

      - name: Build manifest from published release assets
        run: npm run build:manifest -- --from-releases

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign manifest (keyless)
        run: |
          cosign sign-blob --yes \
            --output-signature registry/manifest.json.sig \
            --output-certificate registry/manifest.json.cert \
            registry/manifest.json

      - name: Open / update the manifest PR
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          branch="bot/manifest-update"
          git switch -C "$branch"
          git add registry/manifest.json registry/manifest.json.sig registry/manifest.json.cert

          if git diff --cached --quiet; then
            echo "Manifest unchanged; nothing to propose."
            exit 0
          fi

          gen="$(node -p 'require("./registry/manifest.json").generatedAt')"
          # -s adds the DCO sign-off so the dco check passes on this PR.
          git commit -s -m "chore(registry): publish manifest ($gen)"
          git push -f origin "$branch"

          if gh pr view "$branch" --json state --jq .state 2>/dev/null | grep -q OPEN; then
            echo "Existing manifest PR updated."
          else
            gh pr create --base main --head "$branch" \
              --title "Publish registry manifest" \
              --body "Automated manifest build (\`--from-releases\`), cosign-signed. Review and **squash-merge** to publish; GitHub signs the resulting commit on \`main\`. Updates \`registry/manifest.json\` + \`.sig\` + \`.cert\`. (generatedAt: $gen)"
          fi
