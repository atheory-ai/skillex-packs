name: release-manifest

# Publishes the signed registry manifest. Runs after a pack release completes
# (and on demand). The manifest's SHA256s are sourced from the actual
# published release assets (build-manifest --from-releases), so the manifest
# provably matches what consumers download — independent of build determinism.
#
# Publishing model: the manifest is a version-controlled artifact on `main`
# (registry/manifest.json + .bundle), updated via a **reviewed PR**.
# This is the only write path that fits the repo's security posture —
# immutable releases rule out updating a release, and the Tag Ruleset rules
# out CI creating new tags — while keeping `main` fully protected
# (require-PR + signed commits, no bot bypass). This workflow commits the
# signed manifest to a bot branch via the GitHub Contents API — commits made
# through the API are signed by GitHub (Verified), so they satisfy
# required_signatures with no signing key on the runner — then links a PR. A
# human opens (org policy bars Actions from creating PRs), reviews, and
# squash-merges. Pack tarballs stay on their immutable, per-version Releases.
#
# First-party only: gh (GitHub API) + GitHub/Sigstore official actions. No
# third-party PR actions, no signing keys in CI.

on:
  workflow_run:
    workflows: [release-pack]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write        # push the bot branch
  pull-requests: write   # open the manifest PR
  id-token: write        # cosign keyless

jobs:
  propose:
    # Only after a successful pack release (or a manual run).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci

      - name: Build manifest from published release assets
        run: npm run build:manifest -- --from-releases

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign manifest (keyless, bundle)
        run: |
          # A cosign bundle is self-contained (signature + cert + tlog entry),
          # so verify-blob checks it against the embedded entry instead of an
          # online Rekor search (which is flaky for separate sig/cert files).
          cosign sign-blob --yes \
            --bundle registry/manifest.json.bundle \
            registry/manifest.json

      - name: Commit manifest to bot branch (GitHub-verified, via API) and link the PR
        env:
          REPO: ${{ github.repository }}
          BOT_NAME: "github-actions[bot]"
          BOT_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
        run: |
          set -euo pipefail
          branch="bot/manifest-update"
          gen="$(node -p 'require("./registry/manifest.json").generatedAt')"
          # Commit message carries the DCO sign-off so the dco check passes;
          # author == sign-off identity (the bot).
          msg="$(printf 'chore(registry): publish manifest (%s)\n\nSigned-off-by: %s <%s>' "$gen" "$BOT_NAME" "$BOT_EMAIL")"

          # Reset the bot branch to main so its only delta is the manifest.
          main_sha="$(gh api "repos/$REPO/git/ref/heads/main" --jq .object.sha)"
          if gh api "repos/$REPO/git/ref/heads/$branch" >/dev/null 2>&1; then
            gh api -X PATCH "repos/$REPO/git/refs/heads/$branch" -f sha="$main_sha" -F force=true >/dev/null
          else
            gh api -X POST "repos/$REPO/git/refs" -f ref="refs/heads/$branch" -f sha="$main_sha" >/dev/null
          fi

          # Commit each file via the Contents API → GitHub signs the commit
          # (Verified), satisfying required_signatures without a key on the runner.
          put() {
            local path="$1" file="$2" sha
            sha="$(gh api "repos/$REPO/contents/$path?ref=$branch" --jq .sha 2>/dev/null || true)"
            jq -n \
              --arg message "$msg" \
              --arg content "$(base64 -w0 "$file")" \
              --arg branch "$branch" \
              --arg sha "$sha" \
              --arg name "$BOT_NAME" --arg email "$BOT_EMAIL" \
              '{message:$message, content:$content, branch:$branch,
                committer:{name:$name, email:$email},
                author:{name:$name, email:$email}}
               + (if $sha == "" then {} else {sha:$sha} end)' \
            | gh api -X PUT "repos/$REPO/contents/$path" --input - >/dev/null
          }
          put registry/manifest.json registry/manifest.json
          put registry/manifest.json.bundle registry/manifest.json.bundle

          url="${GITHUB_SERVER_URL}/${REPO}/compare/main...${branch}?expand=1"
          body="Automated manifest build (\`--from-releases\`), cosign-signed (bundle), committed via the API so the commits are GitHub-verified. Review and **squash-merge** to publish. Updates \`registry/manifest.json\` + \`.bundle\`. (generatedAt: $gen)"

          # Open the PR if Actions is permitted; otherwise link it for a human.
          if gh pr view "$branch" --json state --jq .state 2>/dev/null | grep -q OPEN; then
            echo "Existing manifest PR updated → $url"
          elif gh pr create --base main --head "$branch" --title "Publish registry manifest" --body "$body" 2>/dev/null; then
            echo "Opened manifest PR."
          else
            echo "::notice::Actions can't auto-open PRs here (org policy). Open the publish PR: $url"
          fi

          {
            echo "## Signed manifest ready to publish"
            echo ""
            echo "Branch \`$branch\` updated with **GitHub-verified** commits (generatedAt \`$gen\`)."
            echo ""
            echo "👉 [Open the publish PR]($url) — review and squash-merge."
          } >> "$GITHUB_STEP_SUMMARY"
