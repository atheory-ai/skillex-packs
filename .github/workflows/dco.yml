name: dco

# Verify every commit in a PR carries a Developer Certificate of Origin
# sign-off (`Signed-off-by`) matching its author. Implemented inline rather
# than via a third-party action — the registry holds itself to the same
# supply-chain bar it asks of packs (.specs/03-security.md).

on:
  pull_request:

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check sign-off on each commit
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          fail=0
          for c in $(git rev-list "$BASE..$HEAD"); do
            # Skip merge commits (more than one parent).
            if [ "$(git rev-list --parents -n1 "$c" | wc -w)" -gt 2 ]; then
              continue
            fi
            email="$(git show -s --format='%ae' "$c")"
            signoffs="$(git show -s --format='%(trailers:key=Signed-off-by,valueonly)' "$c")"
            if ! printf '%s\n' "$signoffs" | grep -qiF "$email"; then
              subject="$(git show -s --format='%s' "$c")"
              echo "::error::Commit ${c:0:12} \"$subject\" is missing a Signed-off-by for <$email>. Run: git commit --amend -s (or git rebase --signoff)."
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "DCO check failed. See CONTRIBUTING.md and the DCO file."
            exit 1
          fi
          echo "All commits signed off."
