name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned Node keeps the deterministic tarball/manifest reproducible
      # (gzip output depends on the bundled zlib version).
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci

      # Unit/integration tests for the registry tooling (lint gate, tarball
      # determinism, manifest builder).
      - name: Test tooling
        run: npm test

      # Pack security / content / naming gate (.specs/03 + 04).
      - name: Lint packs
        run: npm run lint:packs

      # The manifest must build from the packs (.specs/05). Write to a
      # throwaway path under the gitignored registry/build/ so this smoke
      # check never clobbers the committed registry/manifest.json — the
      # tamper-guard below verifies that committed file against its signature.
      - name: Build manifest (smoke)
        run: npm run build:manifest -- --out registry/build/_validate-manifest.json

      # Repo skill test files are well-formed (.specs / skillex convention).
      # Invoked via node directly rather than the .bin shim: some npm
      # versions on CI runners don't link the platform-binary wrapper's bin,
      # though the package itself installs fine.
      - name: Validate skills
        run: node node_modules/@atheory-ai/skillex/bin/skillex.js test validate

      # Tamper guard: if a signed manifest is committed, it MUST still verify
      # against its committed signature and have been produced by the
      # release-manifest workflow. A hand-edited manifest can't satisfy this
      # (its signature won't match, and a human can't sign as that workflow
      # identity), so such a PR fails here and cannot merge. Defense-in-depth
      # alongside the engine's per-fetch verification (.specs/03-security.md,
      # .specs/05-distribution.md). Skipped until the first signed manifest
      # lands (bootstrap).
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Verify committed manifest signature
        run: |
          set -euo pipefail
          # Bootstrap-aware strictness: once `main` carries a bundle it must
          # always be present (a PR can't drop the signature to bypass this),
          # but before the first signed manifest exists there's nothing to
          # verify yet.
          git fetch --no-tags --depth=1 origin main >/dev/null 2>&1 || true
          base_has_bundle=false
          if git cat-file -e origin/main:registry/manifest.json.bundle 2>/dev/null; then
            base_has_bundle=true
          fi
          if [ ! -f registry/manifest.json.bundle ]; then
            if [ "$base_has_bundle" = true ]; then
              echo "::error::registry/manifest.json.bundle is missing but exists on main — refusing to drop the manifest signature."
              exit 1
            fi
            echo "Bootstrap: no manifest bundle on main yet; nothing to verify."
            exit 0
          fi
          cosign verify-blob \
            --bundle registry/manifest.json.bundle \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/atheory-ai/skillex-packs/\.github/workflows/release-manifest\.yml@' \
            registry/manifest.json
