# Engine fields (consumed by @atheory-ai/skillex — internal/packs/pack.go).
name: atheory-ai.javascript.tool.example
version: 0.1.0
description: Minimal example pack that exercises the registry build pipeline.

skills:
  - file: skills/usage.md
    activate-when:
      files-present:
        - package.json
    scope: subtree

# Registry-only metadata. Not part of the engine's manifest struct — the
# engine ignores it; the registry reads it to build the signed manifest.
registry:
  license: Apache-2.0
  authors: [atheory-ai]
  homepage: https://github.com/atheory-ai/skillex-packs/tree/main/ecosystems/javascript/packs/atheory-ai/tool.example
  compatibility:
    node: ">=20"
    skillex: ">=0.7 <2"
